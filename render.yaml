services:
  - type: web
    name: quorum
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_PROVIDER
        value: supabase
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b
      # secrets — Render 대시보드에서 입력(NEXT_PUBLIC_*는 빌드타임 인라인이라 빌드 전 설정 필수)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # 임베딩(선택) — 미설정 시 importance fallback
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
